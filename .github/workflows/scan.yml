# GitHub Actions cloud scanner.
#
# Runs every 6 hours: picks the canton with the largest enumerated-vs-scanned
# gap, scans up to ~5h45m worth of parcels (under the 6h hard job limit),
# commits the updated herrenlos.db + JSON exports back to the repo.
#
# Public repo: unlimited minutes. The repo IS the synced database.
#
# CI-eligible cantons:
#   JU  — OCR-solvable image CAPTCHA (ddddocr), no login    (~13k parcels)
#   SZ  — OCR-solvable image CAPTCHA (ddddocr), no login    (~18k parcels)
#   SH  — 100 req/day per IP; rotated via WEBSHARE_PROXY_LIST (~9k parcels)
#         10 proxies → 900 parcels/day → completes in ~10 CI runs
#
# Run locally instead (see main.py for details):
#   FR          — keycloak.fr.ch geo-blocks datacenter IPs; works from Swiss IP
#   UR          — geo.ur.ch geo-blocks datacenter IPs; works from Swiss IP
#   NE, GR      — Playwright (NE) / 10/day quota (GR) — run locally with proxies
#   SO          — reCAPTCHA v3 score passes from residential IP, not datacenter
#   BE, VS      — one-time interactive login; token cached; macOS/laptop only
#   BL          — needs ANTHROPIC_API_KEY for handwritten CAPTCHA
#   GE          — Imperva + image CAPTCHA; needs proxies + ANTHROPIC_API_KEY

name: scan

on:
  schedule:
    - cron: "0 */6 * * *"      # every 6 hours
  workflow_dispatch:
    inputs:
      canton:
        description: "Canton to scan (lower-case). Leave empty for auto-pick."
        required: false
        default: ""

# Don't run two scans in parallel — they would both want to commit the DB.
concurrency:
  group: scanner
  cancel-in-progress: false

permissions:
  contents: write    # we git push commits back

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # 5h50m — fits inside GitHub Actions' 6h hard limit
    env:
      # Cantons eligible for CI scanning.
      # ur — geo.ur.ch blocks datacenter IPs ("access denied for your country")
      # bs — cmd_bs is metadata-only (no owner names, no Type B); use bs-public locally
      # sh — rotated via WEBSHARE_PROXY_LIST (10 proxies × 90 q = 900/day)
      ELIGIBLE_CANTONS: "ju sz sh"
      # Optional: BS needs a free API key (one-time registration at api.geo.bs.ch).
      BS_API_KEY: ${{ secrets.BS_API_KEY }}
      # Webshare datacenter proxy list for SH quota rotation.
      # Add comma-separated host:port:user:pass lines as repo secret WEBSHARE_PROXY_LIST.
      SH_PROXY_LIST: ${{ secrets.WEBSHARE_PROXY_LIST }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }

      - name: Install scanner deps (no Playwright needed for eligible cantons)
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml ddddocr pillow numpy

      - name: Sync to latest main before scanning
        # Reset to origin/main so we start from the freshest DB (includes any
        # concurrent local scans that landed since this run was triggered).
        # Without this, CI checks out a stale commit and its pick_canton gap
        # numbers are wrong; the merge step at commit time fixes data loss but
        # this ensures the scan itself builds on up-to-date state.
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Initialise database (if not committed yet)
        run: python -c "from db import init_db; init_db()"

      - name: Pick the canton needing work most
        id: pick
        run: |
          set -e
          INPUT="${{ github.event.inputs.canton }}"
          if [ -n "$INPUT" ]; then
            CANTON="$INPUT"
            echo "Picked manually: $CANTON"
          else
            CANTON=$(python scripts/pick_canton.py)
            echo "Picked automatically: $CANTON"
          fi
          echo "canton=$CANTON" >> "$GITHUB_OUTPUT"

      - name: Run scan
        env:
          CANTON: ${{ steps.pick.outputs.canton }}
        run: |
          set -e
          echo "Scanning $CANTON …"
          # --limit caps parcels per run.  Aim for ~5h of compute.
          # SH: 900 parcels/day with 10 proxies at delay=1.5s → ~22min per run,
          # scanner stops naturally when all proxies exhausted for the day.
          case "$CANTON" in
            bs) LIMIT=12000 ;;      # BS is small (~7k); ~2h
            ur) LIMIT=20000 ;;      # UR is medium (~20k); ~5h
            ju) LIMIT=11000 ;;      # ~6.7h full → cap at 5h
            sz) LIMIT=12000 ;;      # ~7.5h full → cap at 5h
            fr) LIMIT=18000 ;;      # FR is large (~80k) → many runs needed
            sh) LIMIT=9000  ;;      # SH is small (~9k); proxy rotation caps actual queries
            *)  LIMIT=10000 ;;
          esac
          timeout 5h python main.py "$CANTON" --limit "$LIMIT" || echo "Scan timed out or failed — committing partial progress."

      - name: Export dashboard JSON
        # Don't lose scan results if export glitches (e.g. swisstopo geocoding
        # blip). The DB has been updated by the scan step — even without fresh
        # JSON, committing the DB preserves the scan progress; next run will
        # regenerate the JSON.
        continue-on-error: true
        run: python scripts/export_for_web.py

      - name: Commit results
        run: |
          git config user.name  "herrenlos-scanner[bot]"
          git config user.email "herrenlos-scanner@users.noreply.github.com"

          # Merge any local scans (BE/VS/FR) that committed to origin/main while
          # CI was running.  Without this, the rebase below would take CI's DB
          # wholesale and overwrite concurrent local data.
          git fetch origin main 2>/dev/null || true
          if git show origin/main:herrenlos.db > _origin.db 2>/dev/null; then
            python scripts/merge_dbs.py _origin.db herrenlos.db
            rm -f _origin.db
          fi

          # Force-add herrenlos.db (gitignored locally so dev DBs don't clutter,
          # but the cloud-managed DB IS committed here).
          git add -f herrenlos.db
          # All dashboard data formats. Use 2>/dev/null||true so missing files
          # don't fail the step on a first-run-with-no-results-yet.
          git add docs/data/*.json docs/data/*.geojson docs/data/*.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."; exit 0
          fi
          git commit -m "scan: ${{ steps.pick.outputs.canton }} (auto)"
          # Push with retries. If a local commit raced us, rebase preferring
          # CI's fresh scan results for the DB.  This is now safe: CI's DB was
          # already merged with origin/main above, so -X theirs preserves all data.
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push rejected (attempt $attempt) — rebasing on origin/main..."
            git fetch origin main
            # Re-merge before replaying: another local commit may have landed
            # between our fetch above and the push attempt.
            if git show origin/main:herrenlos.db > _origin.db 2>/dev/null; then
              python scripts/merge_dbs.py _origin.db herrenlos.db
              git add -f herrenlos.db
              rm -f _origin.db
            fi
            git rebase origin/main -X theirs || git rebase --abort
            sleep 5
          done
          echo "Push failed after 3 attempts — uploading DB as artifact for manual recovery."
          exit 1

      - name: Backup DB as artifact (only if commit step failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: herrenlos-db-after-${{ steps.pick.outputs.canton }}
          path: herrenlos.db
          retention-days: 14
