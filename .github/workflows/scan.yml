# GitHub Actions cloud scanner.
#
# Runs every 6 hours: picks the canton with the largest enumerated-vs-scanned
# gap, scans up to ~5h45m worth of parcels (under the 6h hard job limit),
# commits the updated herrenlos.db + JSON exports back to the repo.
#
# Public repo: unlimited minutes. The repo IS the synced database.
#
# CI-eligible cantons (parcel counts verified via geodienste WFS):
#   JU  — OCR-solvable image CAPTCHA (ddddocr), no login    (~14k parcels)
#   SZ  — OCR-solvable image CAPTCHA (ddddocr), no login    (~50k parcels)
#   SH  — 100 req/day/IP; rotated via Litport hub-us-8      (~43k parcels)
#         2 tokens × 100 req/day → ~200/day → ~215 CI runs to complete.
#   GR  — 10 req/day/IP; rotated via Litport hub-us-10      (~226k parcels)
#         2 tokens × 10 req/day → ~20/day → ~11,300 CI runs (slow but passive).
#   NE  — Altcha PoW CAPTCHA (PBKDF2, auto-solved); Swiss residential proxy
#         via DATAIMPULSE_PROXY (sitn.ne.ch blocks datacenter IPs). 2 workers.
#         ~91k parcels; ~820/hr.
#   FR  — No CAPTCHA, no login; Swiss residential proxy via DATAIMPULSE_PROXY
#         (keycloak.fr.ch geo-blocks datacenter IPs). ~147k parcels; ~1200/hr.
#   UR  — No CAPTCHA, no login; Swiss residential proxy via DATAIMPULSE_PROXY
#         (geo.ur.ch geo-blocks datacenter IPs). ~5k parcels.
#   BS  — REST API (api.geo.bs.ch) with free API key; no geo-blocking, no proxy
#         needed. ~8.6k parcels; API key in BS_API_KEY secret.
#   BL  — handwritten CAPTCHA; OCR chain: ddddocr → tesseract → Claude vision.
#         No geo-blocking, no login. Needs ANTHROPIC_API_KEY secret. ~70k parcels.
#
# Run locally instead (see main.py for details):
#   BE, VS  — one-time interactive login; token cached; macOS/laptop only
#   SO, GE  — reCAPTCHA/Imperva; 94%+ failure rate even from residential IPs

name: scan

on:
  schedule:
    - cron: "0 */6 * * *"      # every 6 hours
  workflow_dispatch:
    inputs:
      canton:
        description: "Canton to scan (lower-case). Leave empty for auto-pick."
        required: false
        default: ""

# Don't run two scans in parallel — they would both want to commit the DB.
concurrency:
  group: scanner
  cancel-in-progress: false

permissions:
  contents: write    # we git push commits back

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # 5h50m — fits inside GitHub Actions' 6h hard limit
    env:
      # Opt into Node.js 24 for all JS actions (checkout, cache, setup-python,
      # upload-artifact). Mandatory from 2026-06-02; setting it now avoids the
      # deprecation warning and ensures compatibility before the forced cutover.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Cantons eligible for CI scanning.
      # NE/FR/UR: geo-blocked from datacenter IPs — Swiss residential proxy via DataImpulse.
      # BS: public API with free key — no proxy needed, no geo-blocking.
      ELIGIBLE_CANTONS: "ju sz sh gr ne fr ur bs bl"
      # NE: 4 workers on CI — DataImpulse assigns a fresh CH residential IP per new
      #     connection (per parcel), so the captcha server never sees >5 req from any
      #     IP. NE_WORKERS=2 was for the local laptop (shared IP). 4 = safe on CI.
      NE_WORKERS: "4"
      # NE / FR / UR — DataImpulse Swiss residential proxy (geo-blocked from datacenter IPs)
      NE_PROXY_LIST: ${{ secrets.DATAIMPULSE_PROXY }}
      FR_PROXY_LIST: ${{ secrets.DATAIMPULSE_PROXY }}
      UR_PROXY_LIST: ${{ secrets.DATAIMPULSE_PROXY }}
      # BS: free REST API key (no geo-blocking, no proxy needed)
      BS_API_KEY: ${{ secrets.BS_API_KEY }}
      # BL: ddddocr primary OCR; ANTHROPIC_API_KEY would enable Claude vision fallback
      #     but is not required. Without it, unsolvable CAPTCHAs are retried next run.
      # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # SH: Litport DC Shared Rotating hub-us-8 (rotation=150s, 100 req/day/IP quota)
      #     datacenter OK — SH is rate-limited per IP, NOT geo-blocked
      SH_PROXY_LIST: ${{ secrets.SH_PROXY_LIST }}
      # GR: Litport DC Shared Rotating hub-us-10 (rotation=5s, 10 req/day/IP quota)
      #     datacenter OK — GR is rate-limited per IP, NOT geo-blocked
      GR_PROXY_LIST: ${{ secrets.GR_PROXY_LIST }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true        # enum.db is in Git LFS; lfs:true downloads the real file

      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }

      - name: Install scanner deps
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml ddddocr pillow numpy

      - name: Sync to latest main before scanning
        # Reset to origin/main so we start from the freshest DB (includes any
        # concurrent local scans that landed since this run was triggered).
        # Without this, CI checks out a stale commit and its pick_canton gap
        # numbers are wrong; the merge step at commit time fixes data loss but
        # this ensures the scan itself builds on up-to-date state.
        run: |
          git fetch origin main
          git reset --hard origin/main
          git lfs pull   # re-download enum.db after reset (lfs:true only runs at initial checkout)

      # enum.db is tracked in Git LFS (see .gitattributes) and already present
      # after the checkout step above.  The old actions/cache step was removed
      # because it restored stale cached versions that overwrote the LFS copy,
      # producing wrong "enumerated" counts in progress.json (e.g. SH=857 instead
      # of 43k, VS=0 instead of 317k).  LFS is the canonical source — no cache needed.

      - name: Initialise database (if not committed yet)
        run: python -c "from db import init_db; init_db()"

      - name: Heal known false positives
        # Reset rows that were flagged herrenlos by now-fixed scanner bugs
        # (GR Terravis soft-block faults, BS empty-batch artifacts) back to
        # is_herrenlos=NULL with a fresh timestamp, so the fixed scanners
        # re-evaluate them THIS run instead of skipping them forever via
        # already_scanned().  Idempotent and self-limiting: once a row is
        # corrected it no longer matches, so this is a fast no-op once the
        # backlog clears.  Pairs with the prefer-newer merge in merge_dbs.py,
        # which propagates the corrected rows across concurrent runs.
        run: python scripts/heal_false_positives.py

      - name: Run scan loop
        # Keep picking and scanning cantons until the time budget runs out.
        # Previously each job scanned ONE canton then sat idle for the rest of
        # the 6h window.  Now when GR exhausts its 90 proxy queries in ~10 min,
        # the loop immediately picks JU or SZ and keeps scanning.
        id: scan_loop
        run: |
          set -e
          # 5h25m budget — leaves ~35 min for export + commit + push retries.
          DEADLINE=$(( $(date +%s) + 5*3600 + 25*60 ))
          SCANNED_CANTONS=""
          MANUAL="${{ github.event.inputs.canton }}"

          # Proxy-limited cantons: each has a fixed daily quota tied to the
          # Webshare proxy pool.  Once they've had one turn they're spent for
          # the day — exclude them from further picks so the loop doesn't
          # immediately re-pick them (they still show a large gap in the DB).
          PROXY_LIMITED="sh gr"
          EXCLUDE_CANTONS=""

          while [ $(date +%s) -lt $DEADLINE ]; do
            REMAINING=$(( DEADLINE - $(date +%s) ))
            [ $REMAINING -lt 120 ] && break   # stop if < 2 min left

            if [ -n "$MANUAL" ]; then
              CANTON="$MANUAL"
              MANUAL=""   # only honour the manual override once, then auto-pick
              echo "=== $(date -u '+%H:%M:%S') Manual pick: $CANTON (${REMAINING}s remaining) ==="
            else
              # Priority: run proxy-quota cantons (SH, GR) first every job so
              # their daily budget is never wasted.  Their quota resets every 24h
              # regardless of whether a run picked them — skipping them loses
              # that day's scan capacity permanently.  After one turn each they
              # join EXCLUDE_CANTONS and auto-pick takes over for JU/SZ.
              CANTON=""
              for _PC in $PROXY_LIMITED; do
                if echo " $ELIGIBLE_CANTONS " | grep -qw "$_PC" && \
                   ! echo " $EXCLUDE_CANTONS " | grep -qw "$_PC"; then
                  CANTON="$_PC"
                  break
                fi
              done
              if [ -z "$CANTON" ]; then
                CANTON=$(EXCLUDE_CANTONS="$EXCLUDE_CANTONS" python scripts/pick_canton.py) \
                  || { echo "No eligible cantons remaining — done."; break; }
                echo "=== $(date -u '+%H:%M:%S') Auto-picked: $CANTON (${REMAINING}s remaining) ==="
              else
                echo "=== $(date -u '+%H:%M:%S') Priority pick: $CANTON (proxy quota, ${REMAINING}s remaining) ==="
              fi
            fi

            # Per-canton limits.
            # SH/GR: exit naturally on proxy exhaustion; no limit needed.
            # JU/SZ: no proxy limit — use 99999 so the scanner can reach parcels
            #   beyond the already-scanned front of the enum.  DO NOT use a low
            #   limit like 11000/12000 here: the scanner iterates parcel_enum in
            #   order, and all already-scanned parcels sit at the front.  A limit
            #   below the already-scanned count means every run hits only done
            #   parcels, returns scanned=0 in <1s, and the loop spins for hours.
            #   The `timeout ${REMAINING}s` wrapper already caps the wall-clock
            #   budget — no explicit limit needed for OCR-only cantons.
            case "$CANTON" in
              ju) LIMIT=99999 ;;    # ~14k total; timeout caps wall time
              sz) LIMIT=99999 ;;    # ~50k total; timeout caps wall time
              sh) LIMIT=99999 ;;    # runs until all proxies exhausted (~1000/day)
              gr) LIMIT=99999 ;;    # runs until all proxies exhausted (~100/day)
              bs) LIMIT=12000 ;;
              ur) LIMIT=20000 ;;
              fr) LIMIT=18000 ;;
              ne) LIMIT=500   ;;
              *)  LIMIT=10000 ;;
            esac

            SCAN_START=$(date +%s)
            timeout ${REMAINING}s python main.py "$CANTON" --limit "$LIMIT" \
              || echo "Scan exited (timeout or failure) — continuing loop."
            SCAN_ELAPSED=$(( $(date +%s) - SCAN_START ))

            # Proxy-limited cantons are spent after one turn — exclude them
            # from the rest of this job so pick_canton.py doesn't re-pick them.
            if echo " $PROXY_LIMITED " | grep -qw "$CANTON"; then
              EXCLUDE_CANTONS="${EXCLUDE_CANTONS:+$EXCLUDE_CANTONS }$CANTON"
              echo "[$CANTON] proxy quota spent — excluded from further picks this job."
            fi

            # Safety net: if the scan finished in < 10 seconds, it almost certainly
            # returned scanned=0 (all eligible parcels already done or errored out
            # with nothing to retry).  Exclude the canton for the rest of this job
            # so the loop doesn't spin on it burning the remaining budget.
            if [ $SCAN_ELAPSED -lt 10 ] && ! echo " $EXCLUDE_CANTONS " | grep -qw "$CANTON"; then
              EXCLUDE_CANTONS="${EXCLUDE_CANTONS:+$EXCLUDE_CANTONS }$CANTON"
              echo "[$CANTON] completed in ${SCAN_ELAPSED}s (scanned=0) — excluded for this job."
            fi

            # Accumulate distinct canton names for the commit message.
            if ! echo " $SCANNED_CANTONS " | grep -qw "$CANTON"; then
              SCANNED_CANTONS="${SCANNED_CANTONS:+$SCANNED_CANTONS }$CANTON"
            fi
          done

          echo "cantons=${SCANNED_CANTONS}" >> "$GITHUB_OUTPUT"
          echo "Scan loop complete. Scanned: ${SCANNED_CANTONS}"

      - name: Export dashboard JSON
        # Don't lose scan results if export glitches (e.g. swisstopo geocoding
        # blip). The DB has been updated by the scan step — even without fresh
        # JSON, committing the DB preserves the scan progress; next run will
        # regenerate the JSON.
        continue-on-error: true
        run: python scripts/export_for_web.py

      - name: Commit results
        run: |
          git config user.name  "herrenlos-scanner[bot]"
          git config user.email "herrenlos-scanner@users.noreply.github.com"

          # Merge any local scans (BE/VS/FR) that committed to origin/main while
          # CI was running.  Without this, the rebase below would take CI's DB
          # wholesale and overwrite concurrent local data.
          git fetch origin main 2>/dev/null || true
          if git show origin/main:herrenlos.db > _origin.db 2>/dev/null; then
            python scripts/merge_dbs.py _origin.db herrenlos.db
            rm -f _origin.db
          fi

          git add herrenlos.db
          # All dashboard data formats. Use 2>/dev/null||true so missing files
          # don't fail the step on a first-run-with-no-results-yet.
          git add docs/data/*.json docs/data/*.geojson docs/data/*.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."; exit 0
          fi
          git commit -m "scan: ${{ steps.scan_loop.outputs.cantons }} (auto)"
          # Push with retries. If a local commit raced us, re-merge the DB,
          # amend the scan commit with the merged state, then rebase.
          # Amending before rebase is critical: -X theirs replays the commit's
          # DB content, so the re-merge must be baked into the commit first.
          for attempt in 1 2 3 4 5 6 7 8; do
            if git push; then exit 0; fi
            echo "Push rejected (attempt $attempt) — rebasing on origin/main..."
            git fetch origin main
            # Re-merge: another local commit may have landed since our last fetch.
            if git show origin/main:herrenlos.db > _origin.db 2>/dev/null; then
              python scripts/merge_dbs.py _origin.db herrenlos.db
              git add herrenlos.db
              rm -f _origin.db
            fi
            # Amend the scan commit so the rebase replays the freshly merged DB.
            git commit --amend --no-edit
            git rebase origin/main -X theirs || git rebase --abort
            sleep $((RANDOM % 10 + 5))
          done
          echo "Push failed after 8 attempts — uploading DB as artifact for manual recovery."
          exit 1

      - name: Backup DB as artifact (only if commit step failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: herrenlos-db-after-${{ steps.scan_loop.outputs.cantons }}
          path: herrenlos.db
          retention-days: 14
